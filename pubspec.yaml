name: folio
description: "Folio – The Offline Document Studio"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  sqflite: ^2.3.0
  path_provider: ^2.1.2
  path: ^1.8.3
  image_picker: ^1.1.2
  google_mlkit_text_recognition: ^0.13.0
  pdf: ^3.10.10
  open_filex: ^4.5.0
  signature: ^5.5.0
  intl: ^0.19.0
  google_fonts: ^6.2.1
  share_plus: ^10.1.0
  file_picker: ^11.0.0
  image_cropper: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
